sw<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denuncia Pelotas - Login</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/dark-mode.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="nav-buttons" style="position: absolute; top: 20px; left: 20px; z-index: 1000;">
    <button onclick="window.location.href='inicial.html'" style="padding: 10px 15px; border-radius: 5px; border: none; background: #ff8c00; color: white; cursor: pointer; font-weight: bold; margin-right: 10px;">
        🏠 Início
    </button>
    <button onclick="window.history.back()" style="padding: 10px 15px; border-radius: 5px; border: none; background: rgba(255,255,255,0.2); color: white; cursor: pointer; backdrop-filter: blur(5px);">
        ⬅️ Voltar
    </button>
</div>
    <main class="login-container">
        <form id="loginForm">
            <h2>Login</h2>
            <div class="input-box">
                <input type="text" id="username" placeholder="Usuário" required>
                <i class="bx bx-user"></i>
            </div>
            <div class="input-box">
                <input type="password" id="password" placeholder="Senha" required>
                
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                </label>
                <a href="#">Esqueceu a senha?</a>
            </div>

            <button type="button" class="btn-login-submit" onclick="handleLoginButtonClick()">Entrar</button>

            <div class="register-link">
                <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
            </div>
        </form>
    </main>

    <script src="../js/dark-mode.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
