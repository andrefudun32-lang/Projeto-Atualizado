<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Denúncia Pelotas</title>
    <link rel="stylesheet" href="../css/admin-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <div class="header-content">
                <h1><i class="fas fa-shield-alt"></i> Painel Administrativo</h1>
                <div class="user-info">
                    <span id="adminName">Carregando...</span>
                    <button onclick="logout()" class="logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                </div>
            </div>
        </header>

        <div class="admin-content">
            <aside class="sidebar">
                <nav class="admin-nav">
                    <a href="#" class="nav-item active" onclick="showSection('dashboard')">
                        <i class="fas fa-tachometer-alt"></i> Dashboard
                    </a>
                    <a href="#" class="nav-item" onclick="showSection('denuncias')">
                        <i class="fas fa-exclamation-triangle"></i> Gerenciar Denúncias
                    </a>
                    <a href="#" class="nav-item" onclick="showSection('filtros')">
                        <i class="fas fa-filter"></i> Filtros
                    </a>
                    <a href="#" class="nav-item" onclick="showSection('estatisticas')">
                        <i class="fas fa-chart-bar"></i> Estatísticas
                    </a>
                </nav>
            </aside>

            <main class="main-content">
                <div id="dashboard" class="content-section active">
                    <h2>Visão Geral</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-list"></i></div>
                            <div class="stat-info">
                                <h3 id="totalDenuncias">0</h3>
                                <p>Total</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon pending"><i class="fas fa-clock"></i></div>
                            <div class="stat-info">
                                <h3 id="denunciasPendentes">0</h3>
                                <p>Pendentes</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon progress"><i class="fas fa-spinner"></i></div>
                            <div class="stat-info">
                                <h3 id="denunciasEmAndamento">0</h3>
                                <p>Em Andamento</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon resolved"><i class="fas fa-check-double"></i></div>
                            <div class="stat-info">
                                <h3 id="denunciasResolvidas">0</h3>
                                <p>Resolvidas</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="denuncias" class="content-section" style="display: none;">
                    <div class="section-header">
                        <h2>Gerenciar Denúncias</h2>
                        <button onclick="carregarDadosDashboard()" class="btn btn-secondary">
                            <i class="fas fa-sync-alt"></i> Atualizar
                        </button>
                    </div>
                    
                    <div class="denuncias-table-container">
                        <table class="denuncias-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Tipo</th>
                                    <th>Endereço</th>
                                    <th>Status</th>
                                    <th>Prioridade</th>
                                    <th>Data</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="denunciasTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>

                </main>
        </div>
    </div>

    <div id="denunciaModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detalhes da Denúncia</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="denuncia-details">
                    <p><strong>ID:</strong> <span id="modalDenunciaId"></span></p>
                    <p><strong>Tipo:</strong> <span id="modalDenunciaTipo"></span></p>
                    <p><strong>Endereço:</strong> <span id="modalDenunciaEndereco"></span></p>
                    <p><strong>Descrição:</strong></p>
                    <div id="modalDenunciaDescricao" class="desc-box"></div>
                </div>
                <hr>
                <div class="admin-actions">
                    <label>Alterar Status:</label>
                    <select id="statusSelect">
                        <option value="Pendente">Pendente</option>
                        <option value="Em Andamento">Em Andamento</option>
                        <option value="Resolvida">Resolvida</option>
                    </select>
                    <button onclick="salvarAlteracaoStatus()" class="btn btn-primary">Salvar Alteração</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/admin-dashboard.js"></script>
</body>
</html>
